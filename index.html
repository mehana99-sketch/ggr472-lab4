<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGR472 Lab 4</title>
    <!-- mapbox API -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css' rel='stylesheet' />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Turf.js -->
    <script src='https://unpkg.com/@turf/turf@7.2.0/turf.min.js'></script>
    <!--CSS bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <!-- map container -->
    <div id='map' class='map'></div>

    <!-- legend -->
    <div id='legend' class="legend">
        <h4>Legend</h4>
        <div><span></span>Collision Site</div>
        <div class="legend-scale">
            <div>Collision Density</div>
            <div class="legend-gradient"></div>
            <div class="density-labels">
                <span>1</span>
                <span>122</span>
            </div>
        </div>
        <!-- legend contents here -->
    </div>

    <!-- interactivity section (checkbox for filter) -->
    <div class='map-data-container'>
        <!-- Checkbox to show hexgrid -->
        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="hexlayercheck" checked>
            <label class="form-check-label" for="hexlayercheck">Show hexgrid</label>
        </div>
        <!-- Checkbox to show points -->
        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="colllayercheck" checked>
            <label class="form-check-label" for="colllayercheck">Show collision sites</label>
            <!-- note: id must be unique if using multiple layers -->
        </div>

        <!-- links -->
        <script src="script.js"></script>
        <!-- javascript file -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
        <!-- javascript bootstrap, use in conjunction with first script tag -->

</body>

</html>
