<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGR472 Lab 4</title>
    <!-- mapbox API -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css' rel='stylesheet' />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Turf.js -->
    <script src='https://unpkg.com/@turf/turf@7.2.0/turf.min.js'></script>
</head>

<body>

    <!-- MAP CONTAINER -->
    <div id='map' class='map'></div>

    <script src="script.js"></script>

    <!-- interactivity section (checkbox for filter) -->
    <div class='map-data-container'>
        <!-- Checkbox to show hexgrid -->
        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="hexlayercheck" checked>
            <label class="form-check-label" for="hexlayercheck">Show hexgrid</label>
        </div>
        <!-- Checkbox to show points -->
        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="colllayercheck" checked>
            <label class="form-check-label" for="colllayercheck">Show collision sites</label>
        </div>
    <!-- note: id must be unique if using multiple layers -->

</body>

</html>
